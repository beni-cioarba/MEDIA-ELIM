<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <title>Biserica Elim - Rețelele sociale</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Conectează-te cu Biserica Elim: Instagram, Facebook, YouTube și cod QR.">
  <meta name="theme-color" content="#060914">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/pwa/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ELIM Arganda">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Preconectar al CDN del JSON de YouTube para que el TLS handshake
       no bloquee la primera petición. -->
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>

  <!-- Preload del logo y de la primera imagen del hero (LCP) para que
       el navegador las descargue en paralelo con el JS. -->
  <link rel="preload" as="image" href="assets/logo-elim.png" fetchpriority="high">
  <link rel="preload" as="image" href="assets/drive-media/botez_2025.webp" fetchpriority="high">
</head>
<body>
  <app-root></app-root>
</body>
</html>
